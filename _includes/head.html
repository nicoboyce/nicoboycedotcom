<head>
  <link href="https://gmpg.org/xfn/11" rel="profile">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <!-- Description & canonical -->
  <meta name="description" content="{{ page.description | default: site.description | truncate: 155 }}">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Open Graph -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{% if page.title == 'Home' %}{{ site.title }} · {{ site.tagline }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description | truncate: 155 }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{{ site.url }}/public/img/pixel-nico-2.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% if page.title == 'Home' %}{{ site.title }} · {{ site.tagline }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | truncate: 155 }}">
  <meta name="twitter:image" content="{{ site.url }}/public/img/pixel-nico-2.png">

  <!-- Fediverse -->
  <meta name="fediverse:creator" content="@nico@social.coop">
  <link rel="me" href="https://social.coop/@nico">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ site.baseurl }}public/css/main.css">

  <!-- Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>
    {% if page.title == "Home" %}
      {{ site.title }} &middot; {{ site.tagline }}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F1CP4L7W7W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F1CP4L7W7W');
  </script>

</head>

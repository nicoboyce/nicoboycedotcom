<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crawl</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow-x: hidden;
    }
  </style>
</head>
<body>
  <style>
  html, body {
    min-height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  body.playback-mode {
    overflow: hidden;
    height: 100vh;
  }

  /* Starfield */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Creator form */
  #creator {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 60px 20px 40px;
  }
  #creator h1 {
    color: #f5c500;
    font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: 0.05em;
    font-size: 1.8rem;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 36px;
    font-size: 1rem;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    margin-bottom: 5px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 12px;
    background: #111;
    border: 1px solid #333;
    color: #eee;
    font-size: 1rem;
    font-family: inherit;
    border-radius: 4px;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #f5c500;
  }
  .form-group textarea {
    resize: vertical;
    min-height: 150px;
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder {
    color: #555;
  }
  .buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .buttons button {
    flex: 1;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .buttons button:hover { opacity: 0.85; }
  #preview-btn {
    background: transparent;
    border: 2px solid #f5c500;
    color: #f5c500;
  }
  #generate-btn {
    background: #f5c500;
    color: #000;
  }
  #link-output {
    display: none;
    gap: 8px;
    margin-top: 4px;
  }
  #link-output.visible { display: flex; }
  #link-url {
    flex: 1;
    padding: 12px;
    background: #111;
    border: 1px solid #333;
    color: #f5c500;
    font-size: 0.8rem;
    font-family: monospace;
    border-radius: 4px;
    outline: none;
  }
  #copy-btn {
    padding: 12px 20px;
    background: #333;
    border: none;
    color: #eee;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 4px;
    white-space: nowrap;
  }
  #copy-btn:hover { background: #444; }
  .error-msg {
    color: #e74c3c;
    font-size: 0.85rem;
    margin-top: 8px;
    display: none;
  }

  /* Playback */
  #playback {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* Intro text */
  #intro-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #00bfff;
    font-family: "Times New Roman", Georgia, serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    text-align: center;
    opacity: 0;
    width: 80%;
    line-height: 1.6;
  }
  .intro-visible {
    animation: fade-in-out 4.5s ease-in-out forwards;
  }
  @keyframes fade-in-out {
    0% { opacity: 0; }
    12% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Title */
  #title-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(1);
    color: #000;
    -webkit-text-stroke: 2px #f5c500;
    paint-order: stroke fill;
    font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
    font-size: clamp(3rem, 12vw, 8rem);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 0.95;
    opacity: 0;
    width: 90%;
  }
  .title-visible {
    animation: title-fly 4s ease-in forwards;
  }
  @keyframes title-fly {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.05); }
  }

  /* Crawl */
  #crawl-perspective {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    perspective: 300px;
    perspective-origin: 50% 0;
    overflow: hidden;
  }
  #crawl-content {
    position: absolute;
    left: 10%; right: 10%;
    color: #f5c500;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: clamp(1.2rem, 3.5vw, 2rem);
    line-height: 1.7;
    text-align: justify;
    transform-origin: 50% 100%;
    transform: rotateX(20deg);
    text-shadow: 0 0 10px rgba(245, 197, 0, 0.15);
  }
  #crawl-content p {
    margin-bottom: 1.4em;
  }

  /* Fade overlays */
  #fade-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 25%;
    background: linear-gradient(to bottom, #000 40%, transparent);
    z-index: 2;
    pointer-events: none;
    display: none;
  }
  #fade-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 15%;
    background: linear-gradient(to top, #000 20%, transparent);
    z-index: 2;
    pointer-events: none;
    display: none;
  }

  /* Post-crawl link */
  #create-own {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    color: #555;
    font-size: 0.85rem;
    text-decoration: none;
    opacity: 0;
    transition: opacity 1.5s;
    display: none;
  }
  #create-own:hover { color: #999; }

  /* Back button (preview mode) */
  #back-btn {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 10;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #aaa;
    padding: 8px 16px;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 4px;
    display: none;
  }
  #back-btn:hover { background: rgba(255,255,255,0.2); }

  @media (max-width: 500px) {
    #creator { padding: 40px 16px 30px; }
    #crawl-content { left: 8%; right: 8%; }
  }
</style>

<div id="starfield"></div>

<div id="creator">
  <h1>Crawl</h1>
  <p class="subtitle">Make your emails far more dramatic</p>

  <div class="form-group">
    <label for="intro">Intro line</label>
    <input type="text" id="intro" placeholder="A long time ago in an office far, far away...." />
  </div>

  <div class="form-group">
    <label for="title-input">Title</label>
    <input type="text" id="title-input" placeholder="PRINTER WARS" />
  </div>

  <div class="form-group">
    <label for="body">Body text</label>
    <textarea id="body" placeholder="It is a period of civil unrest. The third floor printer has jammed AGAIN and the rebels in accounting refuse to call IT..."></textarea>
  </div>

  <p class="error-msg" id="error-msg">Body text is required.</p>

  <div class="buttons">
    <button id="preview-btn">Preview</button>
    <button id="generate-btn">Generate Link</button>
  </div>

  <div id="link-output">
    <input type="text" id="link-url" readonly="" />
    <button id="copy-btn">Copy</button>
  </div>
</div>

<div id="playback">
  <div id="intro-text"></div>
  <div id="title-text"></div>
  <div id="crawl-perspective">
    <div id="crawl-content"></div>
  </div>
  <div id="fade-top"></div>
  <div id="fade-bottom"></div>
</div>

<p><a id="create-own" href="/crawl">Create your own crawl</a>
<button id="back-btn">✕ Back</button></p>

<script>
  // --- Starfield ---
  function createStarfield() {
    var field = document.getElementById('starfield');
    for (var i = 0; i < 200; i++) {
      var star = document.createElement('div');
      star.className = 'star';
      var size = 1 + Math.random() * 2;
      star.style.cssText =
        'left:' + (Math.random() * 100) + '%;' +
        'top:' + (Math.random() * 100) + '%;' +
        'width:' + size + 'px;' +
        'height:' + size + 'px;' +
        'animation-delay:' + (Math.random() * 4) + 's;' +
        'animation-duration:' + (3 + Math.random() * 4) + 's;' +
        'opacity:' + (0.3 + Math.random() * 0.7) + ';';
      field.appendChild(star);
    }
  }

  // --- Encoding ---
  function encode(data) {
    var obj = {};
    if (data.intro) obj.i = data.intro;
    if (data.title) obj.t = data.title;
    obj.b = data.body;
    var json = JSON.stringify(obj);
    var b64 = btoa(unescape(encodeURIComponent(json)));
    return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  function decode(hash) {
    var b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    try {
      var json = decodeURIComponent(escape(atob(b64)));
      return JSON.parse(json);
    } catch (e) {
      return null;
    }
  }

  // --- Text handling ---
  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatBody(text) {
    var escaped = escapeHtml(text);
    var paragraphs = escaped.split(/\n\s*\n/);
    return paragraphs.map(function(p) {
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
  }

  // --- Playback ---
  function wait(ms) {
    return new Promise(function(resolve) { setTimeout(resolve, ms); });
  }

  async function play(data) {
    var playback = document.getElementById('playback');
    var creator = document.getElementById('creator');
    var introEl = document.getElementById('intro-text');
    var titleEl = document.getElementById('title-text');
    var crawlEl = document.getElementById('crawl-content');
    var fadeTop = document.getElementById('fade-top');
    var fadeBottom = document.getElementById('fade-bottom');
    var createOwn = document.getElementById('create-own');

    document.body.classList.add('playback-mode');
    creator.style.display = 'none';
    playback.style.display = 'block';

    // Set page title to something innocuous for surprise
    if (data.title) {
      document.title = data.title;
    }

    await wait(1000);

    // Intro
    if (data.intro) {
      introEl.textContent = data.intro;
      introEl.classList.add('intro-visible');
      await wait(4500);
      introEl.style.display = 'none';
      await wait(500);
    }

    // Title
    if (data.title) {
      titleEl.innerHTML = escapeHtml(data.title).replace(/\s+/g, '<br>');
      titleEl.classList.add('title-visible');
      await wait(4000);
      titleEl.style.display = 'none';
      await wait(500);
    }

    // Crawl — position offscreen before inserting text to prevent flash
    crawlEl.style.top = (window.innerHeight + 50) + 'px';
    fadeTop.style.display = 'block';
    fadeBottom.style.display = 'block';
    crawlEl.innerHTML = formatBody(data.body);

    // Use rAF loop so the crawl adapts to resize and scrolls smoothly
    // from below the bottom edge
    requestAnimationFrame(function() {
      var textHeight = crawlEl.scrollHeight;
      var speed = 50; // px per second
      var startY = window.innerHeight + 50; // start just below viewport
      var offset = startY;
      var lastTime = null;
      var finished = false;

      function tick(timestamp) {
        if (!lastTime) lastTime = timestamp;
        var dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;

        offset -= speed * dt;

        // Recalculate end point each frame (handles resize)
        var endY = -(crawlEl.scrollHeight + 100);
        crawlEl.style.top = offset + 'px';

        if (offset < endY) {
          finished = true;
          createOwn.style.display = 'block';
          requestAnimationFrame(function() {
            createOwn.style.opacity = '1';
          });
          return;
        }
        crawlAnimId = requestAnimationFrame(tick);
      }

      crawlAnimId = requestAnimationFrame(tick);
    });
  }

  var crawlAnimId = null;

  // --- Preview mode ---
  var isPreview = false;

  function startPreview() {
    var body = document.getElementById('body').value.trim();
    if (!body) {
      document.getElementById('error-msg').style.display = 'block';
      return;
    }
    document.getElementById('error-msg').style.display = 'none';

    isPreview = true;
    document.getElementById('back-btn').style.display = 'block';

    play({
      intro: document.getElementById('intro').value.trim(),
      title: document.getElementById('title-input').value.trim(),
      body: body
    });
  }

  function stopPreview() {
    isPreview = false;
    if (crawlAnimId) {
      cancelAnimationFrame(crawlAnimId);
      crawlAnimId = null;
    }
    document.body.classList.remove('playback-mode');
    document.getElementById('playback').style.display = 'none';
    document.getElementById('creator').style.display = 'block';
    document.getElementById('back-btn').style.display = 'none';
    document.getElementById('create-own').style.display = 'none';
    document.getElementById('create-own').style.opacity = '0';
    document.title = 'Crawl';

    // Reset playback elements
    var introEl = document.getElementById('intro-text');
    var titleEl = document.getElementById('title-text');
    var crawlEl = document.getElementById('crawl-content');
    introEl.className = '';
    introEl.style.display = '';
    titleEl.className = '';
    titleEl.style.display = '';
    crawlEl.style.top = '';
    crawlEl.innerHTML = '';
    document.getElementById('fade-top').style.display = 'none';
    document.getElementById('fade-bottom').style.display = 'none';
  }

  // --- Generate link ---
  function generateLink() {
    var body = document.getElementById('body').value.trim();
    if (!body) {
      document.getElementById('error-msg').style.display = 'block';
      return;
    }
    document.getElementById('error-msg').style.display = 'none';

    var data = {
      intro: document.getElementById('intro').value.trim(),
      title: document.getElementById('title-input').value.trim(),
      body: body
    };
    var hash = encode(data);
    var url = window.location.origin + '/crawl#' + hash;

    if (url.length > 2000) {
      document.getElementById('error-msg').textContent = 'Text is too long — the link would break in some browsers. Try trimming it down.';
      document.getElementById('error-msg').style.display = 'block';
      return;
    }

    var linkOutput = document.getElementById('link-output');
    var linkUrl = document.getElementById('link-url');
    linkUrl.value = url;
    linkOutput.classList.add('visible');
    linkUrl.select();
  }

  function copyLink() {
    var linkUrl = document.getElementById('link-url');
    navigator.clipboard.writeText(linkUrl.value).then(function() {
      document.getElementById('copy-btn').textContent = 'Copied!';
      setTimeout(function() {
        document.getElementById('copy-btn').textContent = 'Copy';
      }, 2000);
    });
  }

  // --- Init ---
  function init() {
    createStarfield();

    // Check for hash payload
    var hash = window.location.hash.slice(1);
    if (hash) {
      var data = decode(hash);
      if (data && data.b) {
        document.getElementById('create-own').style.display = 'none';
        play({ intro: data.i || '', title: data.t || '', body: data.b });
        return;
      }
    }

    // Creator mode — wire up buttons
    document.getElementById('generate-btn').addEventListener('click', generateLink);
    document.getElementById('preview-btn').addEventListener('click', startPreview);
    document.getElementById('copy-btn').addEventListener('click', copyLink);
    document.getElementById('back-btn').addEventListener('click', stopPreview);

    // Hide error on input
    document.getElementById('body').addEventListener('input', function() {
      document.getElementById('error-msg').style.display = 'none';
    });
  }

  init();
</script>


</body>
</html>
